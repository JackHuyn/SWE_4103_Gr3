  #       shell: bash
  #       run: |
  #         # Read the secret from GitHub secrets
  #         OUR_SECRET=${{ secrets.SECRET_KEY }};
  #         # Encrypt the secret using OpenSSL
  #         BINARY_ENCRYPTED_SECRET=$(echo -n "$OUR_SECRET" | openssl enc -aes-256-cbc -pbkdf2 -salt -k "${{ secrets.ENCRYPTION_PASSWORD }}");
  #         # Encode the encrypted binary as base64
